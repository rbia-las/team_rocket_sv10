.view{position:fixed;inset:0;z-index:2;display:flex;flex-direction:column;opacity:1;transition:opacity .25s}
.view.off{opacity:0;pointer-events:none}

/* HOME */
#home{align-items:center;justify-content:space-around;padding:50px 24px 30px}
.h-logo{font-family:'Bebas Neue',sans-serif;font-size:10px;letter-spacing:6px;color:var(--red)}
.h-title{font-family:'Bebas Neue',sans-serif;font-size:40px;letter-spacing:3px;text-align:center;line-height:1.0}
.h-sub{font-size:10px;letter-spacing:4px;color:var(--gray);margin-top:3px;text-align:center}
/* Ring - smaller for left column */
.ring-wrap{position:relative;width:130px;height:130px}
.ring-wrap svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:#1a1a2e;stroke-width:12}
.ring-fg{fill:none;stroke:var(--red);stroke-width:12;stroke-linecap:round;transition:stroke-dashoffset 1.2s cubic-bezier(.4,0,.2,1)}
.ring-inner{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-pct{font-family:'Bebas Neue',sans-serif;font-size:38px;line-height:1}
.ring-lbl{font-size:9px;letter-spacing:2px;color:var(--gray)}
/* Home layout */
#home{padding:72px 20px 30px;justify-content:space-between;gap:0;overflow-y:auto}
.h-header{text-align:center;padding:0 0 6px}
.h-divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,rgba(233,69,96,.25),transparent);margin:0;flex-shrink:0}
.h-btns{display:flex;flex-direction:column;gap:8px;width:100%}
.h-cards-row{display:flex;gap:8px;width:100%;align-items:stretch}
.h-bottom{display:flex;gap:12px;width:100%;align-items:stretch;min-height:130px}
.h-card-link{flex:1;position:relative;border-radius:12px;overflow:hidden;box-shadow:0 8px 28px rgba(0,0,0,.7);text-decoration:none;display:block}
.h-card-img{width:100%;height:100%;object-fit:cover;display:block}
.h-card-error{background:linear-gradient(160deg,#1a0a2e,#2e0a3a)}
.h-card-overlay{position:absolute;inset:0;background:linear-gradient(180deg,transparent 35%,rgba(0,0,0,.9) 100%)}
.h-card-sar{position:absolute;top:6px;right:6px;background:rgba(212,170,255,.92);color:#1a0a2e;font-family:'Rajdhani',sans-serif;font-size:8px;font-weight:700;padding:2px 5px;border-radius:5px;letter-spacing:1px}
.h-card-label{position:absolute;bottom:6px;left:0;right:0;text-align:center}
.h-card-name{font-family:'Bebas Neue',sans-serif;font-size:11px;color:var(--purple);letter-spacing:1px;line-height:1.1}
.h-card-sub{font-size:7px;color:rgba(255,255,255,.55);letter-spacing:.5px}
.h-cm-link{flex:1;text-decoration:none;display:flex;align-items:center;gap:12px;background:rgba(16,16,32,.92);border:1px solid rgba(233,69,96,.25);border-radius:14px;padding:14px 16px;backdrop-filter:blur(12px);transition:all .2s;box-shadow:0 4px 16px rgba(0,0,0,.4)}
.h-cm-link:active{transform:scale(.97);background:rgba(233,69,96,.12)}
.h-cm-text{display:flex;flex-direction:column;gap:2px}
.h-cm-label{font-size:8px;letter-spacing:2px;color:var(--gray);font-family:'Rajdhani',sans-serif}
.h-cm-name{font-family:'Bebas Neue',sans-serif;font-size:22px;letter-spacing:1px;color:#fff;line-height:1}
.h-cm-sub{font-size:8px;color:rgba(233,69,96,.65);letter-spacing:.5px}
.home-body{display:flex;flex:1;width:100%;gap:0;overflow:hidden}
.home-left{display:flex;flex-direction:column;justify-content:center;align-items:center;padding:16px 12px 16px 20px;flex:1;min-width:0;gap:16px}
.home-right{width:175px;flex-shrink:0;position:relative;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:8px 12px 8px 6px}
/* Card preview */
.card-preview-wrap{position:relative;width:150px;border-radius:14px;overflow:hidden;box-shadow:0 16px 40px rgba(0,0,0,.7),0 0 0 1px rgba(255,255,255,.08);flex-shrink:0}
.card-preview-wrap img{width:100%;display:block;border-radius:14px}
.card-preview-shine{position:absolute;inset:0;background:linear-gradient(135deg,rgba(255,255,255,.12) 0%,transparent 50%,rgba(255,255,255,.04) 100%);border-radius:14px;pointer-events:none}
/* Cardmarket button */
.cm-logo-btn{display:flex;align-items:center;gap:8px;background:rgba(22,22,42,.9);border:1px solid rgba(233,69,96,.3);border-radius:12px;padding:8px 10px;color:#fff;text-decoration:none;margin-top:10px;width:100%;backdrop-filter:blur(8px);transition:all .2s}
.cm-logo-btn:active{background:rgba(233,69,96,.2);transform:scale(.97)}
/* Stats */
.stats{display:flex;gap:6px;width:100%}
.sbox{flex:1;background:rgba(22,22,42,.85);border:1px solid rgba(233,69,96,.2);border-radius:10px;padding:10px 4px;text-align:center;backdrop-filter:blur(8px)}
.snum{font-family:'Bebas Neue',sans-serif;font-size:26px;line-height:1}
.slbl{font-size:8px;letter-spacing:1px;color:var(--gray);margin-top:1px}
/* Buttons */
.home-btns{display:flex;flex-direction:column;gap:8px;width:100%;padding:0 20px 0 20px}
.btn-r{width:100%;background:var(--red);color:#fff;border:none;border-radius:14px;padding:14px;font-family:'Bebas Neue',sans-serif;font-size:18px;letter-spacing:3px;cursor:pointer;transition:transform .1s}
.btn-r:active{transform:scale(.97)}
.btn-g{width:100%;background:transparent;color:var(--gray);border:1px solid rgba(170,170,170,.2);border-radius:14px;padding:11px;font-family:'Rajdhani',sans-serif;font-size:13px;letter-spacing:2px;cursor:pointer}

/* CARD VIEW */
#cv-header{display:flex;align-items:center;justify-content:space-between;padding:52px 16px 10px;background:rgba(10,10,20,.8);backdrop-filter:blur(16px);border-bottom:1px solid rgba(233,69,96,.15);flex-shrink:0}
.cv-back{background:none;border:none;color:var(--red);font-family:'Rajdhani',sans-serif;font-size:15px;font-weight:700;cursor:pointer;padding:4px 8px}
.cv-cnt{font-family:'Bebas Neue',sans-serif;font-size:17px;color:var(--gray)}
.flt{background:rgba(233,69,96,.15);border:1px solid rgba(233,69,96,.35);color:var(--red);border-radius:20px;padding:4px 12px;font-family:'Rajdhani',sans-serif;font-size:12px;font-weight:700;cursor:pointer}
.flt.on{background:var(--red);color:#fff}
#stage{flex:1;position:relative;overflow:hidden;display:flex;align-items:center;justify-content:center;touch-action:pan-y}
.cslide{position:absolute;width:82%;max-width:280px;display:flex;flex-direction:column;align-items:center;will-change:transform}
.cframe{width:100%;aspect-ratio:2.5/3.5;border-radius:16px;overflow:hidden;position:relative;background:#16162a;box-shadow:0 24px 60px rgba(0,0,0,.75),0 0 0 1px rgba(255,255,255,.07)}
.cframe img{width:100%;height:100%;object-fit:cover;display:block}
.cframe .no-img{width:100%;height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;background:linear-gradient(135deg,#16162a,#0d0d20)}
.cnum-badge{position:absolute;top:10px;left:10px;background:rgba(0,0,0,.75);color:var(--red);font-family:'Bebas Neue',sans-serif;font-size:17px;padding:2px 8px;border-radius:6px}
.owned-ov{position:absolute;inset:0;background:rgba(0,200,81,.12);border:3px solid var(--green);border-radius:16px;display:flex;align-items:center;justify-content:center;opacity:0;transition:opacity .25s;pointer-events:none}
.owned-ov.on{opacity:1}
.big-check{font-size:72px;color:var(--green);filter:drop-shadow(0 0 18px rgba(0,200,81,.7))}
.cname{font-family:'Bebas Neue',sans-serif;font-size:26px;letter-spacing:2px;margin-top:14px;text-align:center}
.crar{font-size:10px;letter-spacing:3px;margin-top:3px;margin-bottom:14px}
.chk{width:68px;height:68px;border-radius:50%;border:2.5px solid var(--red);background:rgba(10,10,20,.85);color:var(--red);font-size:30px;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;backdrop-filter:blur(8px)}
.chk.on{background:var(--green);border-color:var(--green);color:#fff;box-shadow:0 0 28px rgba(0,200,81,.55)}
.chk:active{transform:scale(.88)}
.dots{display:flex;gap:4px;margin-bottom:8px}
.dot{width:4px;height:4px;border-radius:50%;background:rgba(170,170,170,.3);transition:all .3s}
.dot.on{width:18px;border-radius:2px;background:var(--red)}
#cv-bot{padding:8px 24px 38px;display:flex;flex-direction:column;align-items:center;gap:8px;background:rgba(10,10,20,.85);backdrop-filter:blur(16px);border-top:1px solid rgba(233,69,96,.1);flex-shrink:0}
.hint-row{display:flex;justify-content:space-between;width:100%;font-size:10px;color:rgba(170,170,170,.4);letter-spacing:1px}

/* GRID */
#gridview{overflow-y:auto}
#gr-head{display:flex;align-items:center;gap:10px;padding:52px 16px 10px;background:rgba(10,10,20,.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(233,69,96,.15);position:sticky;top:0;z-index:5;flex-shrink:0}
.gr-back{background:none;border:none;color:var(--red);font-size:22px;cursor:pointer;padding:4px}
.gr-ttl{font-family:'Bebas Neue',sans-serif;font-size:20px;letter-spacing:2px}
#gr-search{flex:1;background:rgba(22,22,42,.85);border:1px solid rgba(233,69,96,.2);border-radius:10px;padding:7px 12px;color:#fff;font-family:'Rajdhani',sans-serif;font-size:14px;outline:none}
.gr-flt{background:rgba(233,69,96,.12);border:1px solid rgba(233,69,96,.25);color:var(--red);border-radius:20px;padding:4px 10px;font-size:11px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:'Rajdhani',sans-serif}
.gr-flt.on{background:var(--red);color:#fff}
#gr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;padding:12px}
.gi{background:#16162a;border-radius:10px;overflow:hidden;border:2px solid transparent;cursor:pointer;transition:transform .15s,border-color .2s;position:relative}
.gi.owned{border-color:var(--green)}
.gi:active{transform:scale(.94)}
.gi img{width:100%;aspect-ratio:2.5/3.5;object-fit:cover;display:block}
.gi .ni{width:100%;aspect-ratio:2.5/3.5;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;background:linear-gradient(135deg,#16162a,#0d0d20)}
.gi .ni span{font-family:'Bebas Neue',sans-serif;font-size:15px;color:var(--red)}
.gi .ni small{font-size:8px;color:var(--gray);text-align:center;padding:0 3px}
.gbadge{position:absolute;top:4px;right:4px;background:var(--green);border-radius:50%;width:16px;height:16px;display:none;align-items:center;justify-content:center;font-size:9px;color:#fff}
.gi.owned .gbadge{display:flex}
#toast{position:fixed;bottom:110px;left:50%;transform:translateX(-50%) translateY(16px);background:rgba(22,22,42,.95);border:1px solid var(--red);color:#fff;padding:9px 20px;border-radius:20px;font-size:14px;font-weight:600;opacity:0;transition:all .3s;z-index:99;white-space:nowrap;backdrop-filter:blur(8px);pointer-events:none}
#toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.rSR{color:var(--blue)}.rAR{color:var(--gold)}.rSAR{color:var(--purple)}.rUR{color:var(--orange)}.rURG{color:var(--gold)}.rBase{color:var(--gray)}
</style>

https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_124_R_JP_SM.png"], [125, "TRs Mewtwo ex", "UR", "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_125_R_JP_SM.png"], [126, "TRs Nidoking ex", "UR", "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_126_R_JP_SM.png"], [127, "TRs Crobat ex", "UR", "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_127_R_JP_SM.png"], [128, "TRs Ariana", "UR", "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_128_R_JP_SM.png"], [129, "TRs Giovanni", "UR", "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_129_R_JP_SM.png"], [130, "TRs Mewtwo ex", "UR Gold", "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_130_R_JP_SM.png"], [131, "TRs Crobat ex", "UR Gold", "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_131_R_JP_SM.png"], [132, "Jamming Tower", "UR Gold", "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_132_R_JP_SM.png"]];
var TOTAL=CARDS.length;
var owned=JSON.parse(localStorage.getItem("trSV10")||"{}");
var cur=0,fltMissing=false,deck=CARDS.slice(),grFlt=false,prevView='home';

function save(){localStorage.setItem("trSV10",JSON.stringify(owned))}
function countOwned(){return Object.keys(owned).filter(function(k){return owned[k]}).length}
function rc(r){if(r==="SR")return"rSR";if(r==="AR")return"rAR";if(r==="SAR")return"rSAR";if(r==="UR")return"rUR";if(r==="UR Gold")return"rURG";return"rBase"}

function updateHome(){
  var n=countOwned(),pct=Math.round(n/TOTAL*100);
  document.getElementById("h-got").textContent=n;
  document.getElementById("h-mis").textContent=TOTAL-n;
  document.getElementById("h-pct").textContent=pct+"%";
  var c=2*Math.PI*60;
  document.getElementById("ring").style.strokeDashoffset=c-(c*n/TOTAL);
}

function toast(msg){
  var t=document.getElementById("toast");
  t.textContent=msg;t.classList.add("on");
  clearTimeout(t._t);t._t=setTimeout(function(){t.classList.remove("on")},2000);
}

/* IMAGE - direct CDN URL, no CORS issues */
/* Image source: Limitless TCG CDN (verified working) */
function imgUrl(num){
  return "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_" + num + "_R_JP_SM.png";
}
function imgUrlFallback(num){
  /* Fallback: same URL */
  return "https://limitlesstcg.nyc3.cdn.digitaloceanspaces.com/tpc/SV10/SV10_" + num + "_R_JP_SM.png";
}

/* CARD VIEW */
function openCards(){
  deck=fltMissing?CARDS.filter(function(c){return!owned[c[0]]}):CARDS.slice();
  cur=0;prevView='home';show("cardview");renderCard();
  document.getElementById('cv-back-btn').innerHTML='&#8592; INICIO';
}
function toggleFlt(){
  fltMissing=!fltMissing;
  document.getElementById("flt-btn").classList.toggle("on",fltMissing);
  document.getElementById("flt-btn").textContent=fltMissing?"TODAS":"FALTAN";
  deck=fltMissing?CARDS.filter(function(c){return!owned[c[0]]}):CARDS.slice();
  cur=0;renderCard();
}

function renderCard(){
  var card=deck[cur];if(!card)return;
  var isOwn=!!owned[card[0]];
  document.getElementById("cv-cnt").textContent=(cur+1)+" / "+deck.length;
  document.getElementById("cnum").textContent="#"+card[0];
  document.getElementById("cname").textContent=card[1];
  var rEl=document.getElementById("crar");
  rEl.textContent=card[2].toUpperCase();rEl.className="crar "+rc(card[2]);
  document.getElementById("cow-ov").classList.toggle("on",isOwn);
  document.getElementById("chk-btn").classList.toggle("on",isOwn);

  /* Image from TCGdex CDN with fallback */
  var img=document.getElementById("cimg");
  img.style.opacity="0";
  var triedFallback=false;
  img.onload=function(){img.style.transition="opacity .3s";img.style.opacity="1";};
  img.onerror=function(){
    if(!triedFallback){triedFallback=true;img.src=imgUrlFallback(card[0]);}
    else{img.style.opacity="0.3";}
  };
  img.src=imgUrl(card[0]);

  /* dots */
  var dotsEl=document.getElementById("dots");dotsEl.innerHTML="";
  var total=deck.length,start=Math.max(0,Math.min(cur-2,total-5)),end=Math.min(total,start+5);
  for(var i=start;i<end;i++){
    var d=document.createElement("div");
    d.className="dot"+(i===cur?" on":"");dotsEl.appendChild(d);
  }
}

function animSwipe(dir,cb){
  var sl=document.getElementById("cslide");
  sl.style.transition="transform .28s cubic-bezier(.4,0,.2,1),opacity .28s";
  sl.style.transform=dir==="l"?"translateX(-115%) rotate(-6deg)":"translateX(115%) rotate(6deg)";
  sl.style.opacity="0";
  setTimeout(function(){
    sl.style.transition="none";
    sl.style.transform=dir==="l"?"translateX(115%) rotate(6deg)":"translateX(-115%) rotate(-6deg)";
    cb();
    requestAnimationFrame(function(){requestAnimationFrame(function(){
      sl.style.transition="transform .28s cubic-bezier(.4,0,.2,1),opacity .28s";
      sl.style.transform="translateX(0) rotate(0)";sl.style.opacity="1";
    });});
  },280);
}

function goNext(){if(cur>=deck.length-1)return;animSwipe("l",function(){cur++;renderCard();});}
function goPrev(){if(cur<=0)return;animSwipe("r",function(){cur--;renderCard();});}

function toggleOwn(){
  var card=deck[cur];if(!card)return;
  owned[card[0]]=!owned[card[0]];save();updateHome();
  var isOwn=owned[card[0]];
  document.getElementById("cow-ov").classList.toggle("on",isOwn);
  document.getElementById("chk-btn").classList.toggle("on",isOwn);
  toast(isOwn?"#"+card[0]+" "+card[1]+" obtenida!":"Desmarcada");
  if(fltMissing&&isOwn){
    deck=CARDS.filter(function(c){return!owned[c[0]]});
    if(cur>=deck.length)cur=Math.max(0,deck.length-1);
    setTimeout(function(){renderCard();},400);
  }
}

/* Touch swipe */
var tx0=0,ty0=0,sw=false;
document.getElementById("stage").addEventListener("touchstart",function(e){tx0=e.touches[0].clientX;ty0=e.touches[0].clientY;sw=true;},{passive:true});
document.getElementById("stage").addEventListener("touchend",function(e){
  if(!sw)return;sw=false;
  var dx=e.changedTouches[0].clientX-tx0,dy=e.changedTouches[0].clientY-ty0;
  if(Math.abs(dx)<Math.abs(dy)*.9||Math.abs(dx)<45)return;
  if(dx<0)goNext();else goPrev();
},{passive:true});
document.addEventListener("keydown",function(e){
  if(!document.getElementById("cardview").classList.contains("off")){
    if(e.key==="ArrowRight")goNext();if(e.key==="ArrowLeft")goPrev();
  }
});

/* GRID */
var grCards=CARDS.slice();
function openGrid(){prevView='home';show("gridview");grCards=CARDS.slice();renderGrid();}
function toggleGridFlt(){
  grFlt=!grFlt;
  document.getElementById("gr-flt").classList.toggle("on",grFlt);
  document.getElementById("gr-flt").textContent=grFlt?"TODAS":"FALTAN";
  var q=document.getElementById("gr-search").value.toLowerCase();
  grCards=(grFlt?CARDS.filter(function(c){return!owned[c[0]]}):CARDS.slice())
    .filter(function(c){return!q||c[1].toLowerCase().includes(q)||String(c[0]).includes(q)});
  renderGrid();
}
function filterGrid(q){
  q=q.toLowerCase();
  grCards=(grFlt?CARDS.filter(function(c){return!owned[c[0]]}):CARDS.slice())
    .filter(function(c){return!q||c[1].toLowerCase().includes(q)||String(c[0]).includes(q)||c[2].toLowerCase().includes(q)});
  renderGrid();
}
function renderGrid(){
  var g=document.getElementById("gr-grid");g.innerHTML="";
  grCards.forEach(function(card){
    var div=document.createElement("div");
    div.className="gi"+(owned[card[0]]?" owned":"");
    div.onclick=function(){
      deck=CARDS.slice();fltMissing=false;
      cur=CARDS.findIndex(function(c){return c[0]===card[0]});
      if(cur<0)cur=0;prevView='gridview';
      show("cardview");renderCard();
      document.getElementById('cv-back-btn').innerHTML='&#8592; CUADRICULA';
    };
    var img=document.createElement("img");
    
    img.loading="lazy";
    img.src=imgUrl(card[0]);
    img.style.opacity="0";
    img.onload=function(){this.style.transition="opacity .3s";this.style.opacity="1";};
    img.onerror=function(){
      var ni=document.createElement("div");ni.className="ni";
      ni.innerHTML='<span>#'+card[0]+'</span><small>'+card[1]+'</small>';
      div.replaceChild(ni,this);
    };
    div.appendChild(img);
    var badge=document.createElement("div");badge.className="gbadge";badge.innerHTML="&#10003;";div.appendChild(badge);
    g.appendChild(div);
  });
}

function goBack(){
  if(prevView==='gridview'){
    show('gridview');
    document.getElementById('cv-back-btn').textContent='\u2190 INICIO';
  } else {
    goHome();
  }
}
function show(id){["home","cardview","gridview"].forEach(function(v){document.getElementById(v).classList.toggle("off",v!==id);});}
function goHome(){show("home");updateHome();}

updateHome();
</script>
